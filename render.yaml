# Render Blueprint — defines the backend API web service
# Docs: https://render.com/docs/blueprint-spec

services:
  # ── Backend (FastAPI) ──
  - type: web
    name: plantdocbot-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    region: oregon
    plan: free
    healthCheckPath: /health
    envVars:
      - key: GEMINI_API_KEY
        sync: false   # Enter this manually in the Render dashboard
      - key: FRONTEND_URL
        sync: false   # Set this to your Vercel URL (e.g., https://plant-doc-bot.vercel.app)

